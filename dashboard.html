<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#020617] text-white">

<div class="flex h-screen">

    <!-- 🔹 SIDEBAR -->
    <div class="w-60 bg-[#0f172a] p-5 border-r border-gray-800">

        <h2 class="text-xl font-bold mb-6 text-blue-400">InteriorCraft</h2>

        <div class="space-y-4 text-gray-300">
            <a href="/" class="block px-2 py-1 rounded hover:bg-blue-500/10 hover:text-blue-400 transition">Home</a>
            <a href="my_designs" class="block px-2 py-1 rounded hover:bg-blue-500/10 hover:text-blue-400 transition">My Designs</a>
            <a href="catalog" class="block px-2 py-1 rounded hover:bg-blue-500/10 hover:text-blue-400 transition">Catalog</a>
            <a href="logout" class="block px-2 py-1 rounded hover:bg-blue-500/10 hover:text-blue-400 transition">Logout</a>

        </div>
    </div>

    <!-- 🔹 MAIN -->
    <div class="flex-1 p-6 overflow-y-auto">

        <!-- 🚀 TOP CTA -->
        <a href="/editor"
   class="block bg-gradient-to-r from-cyan-500 to-blue-600 p-6 rounded-xl shadow-lg mb-6
          hover:scale-[1.02] transition cursor-pointer">

    <h2 class="text-lg font-semibold">✨ Create New Design</h2>

    </a>

        <!-- 📊 STATS -->
        <div class="grid grid-cols-3 gap-4 mb-6">

            <div class="bg-[#0f172a] p-5 rounded-xl shadow-lg border border-gray-800">
                <h2 class="text-2xl font-bold text-cyan-400">12</h2>
                <p class="text-sm text-gray-400">Total Designs</p>
            </div>

            <div class="bg-[#0f172a] p-5 rounded-xl shadow-lg border border-gray-800">
                <h2 class="text-2xl font-bold text-green-400">4</h2>
                <p class="text-sm text-gray-400">Design Styles</p>
            </div>

            <div class="bg-[#0f172a] p-5 rounded-xl shadow-lg border border-gray-800">
                <h2 class="text-2xl font-bold text-purple-400">3</h2>
                <p class="text-sm text-gray-400">Saved Concepts</p>
            </div>

        </div>

        <!-- 🤖 AI + RECENT -->
        <div class="grid grid-cols-3 gap-4">

            <!-- AI CARD -->
           <div  class="bg-[#0f172a] p-5 rounded-xl shadow-lg border border-gray-800
       hover:scale-105 hover:shadow-blue-500/10 transition duration-300">

                <h3 class="text-lg font-semibold text-cyan-400">🤖 AI Interior Assistant</h3>
                <p class="text-sm text-gray-400 mt-2">Analyze your room & generate ideas</p>

               <a href="/design-suggestions"
             class="mt-4 inline-block bg-cyan-500 px-4 py-2 rounded hover:scale-105 transition">

                Generate Design

                </a>

            </div>

         

        </div>

    </div>


    <div id="deleteModal"
     class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50">

    <div id="deleteContent"
         class="bg-[#111827] text-white p-6 rounded-xl w-[380px] shadow-2xl border border-gray-700
                transform transition-all duration-300 scale-90 opacity-0 text-center">

        <h2 class="text-lg font-semibold mb-2">⚠️ Delete Design</h2>
        <p class="text-sm text-gray-400 mb-4">
            Are you sure you want to delete this design?
        </p>

        <div class="flex justify-center gap-3">

            <button onclick="confirmDelete()"
                class="bg-blue-500 px-4 py-2 rounded 
       hover:scale-105 active:scale-95 transition">
                Yes, Delete
            </button>

            <button onclick="closeDeleteModal()"
                class="bg-blue-500 px-4 py-2 rounded 
       hover:scale-105 active:scale-95 transition">
                Cancel
            </button>

        </div>

    </div>
</div>

<div id="toast"
     class="hidden fixed bottom-6 right-6 bg-[#111827] text-white px-5 py-3 rounded-lg shadow-lg border border-gray-700
            transform translate-y-10 opacity-0 transition-all duration-300 z-50">

    <span id="toastText">Action done</span>

</div>


</div>


<script>
function loadDesigns() {

    const projects = JSON.parse(localStorage.getItem("projects")) || [];
    const grid = document.getElementById("designsGrid");

    grid.innerHTML = "";

    if (projects.length === 0) {
        grid.innerHTML = "<p class='text-gray-400'>No designs yet</p>";
        return;
    }

    projects.forEach(p => {

        const card = document.createElement("div");
        card.className = "bg-[#0f172a] p-3 rounded-xl border border-gray-800";

        // IMAGE
        const img = document.createElement("img");
        img.src = p.image;
       class="bg-blue-500 px-4 py-2 rounded hover:scale-105 active:scale-95 transition"

        img.onclick = () => {
            window.location.href = "/editor?design=" + p.id;
        };

        // NAME (editable)
        const name = document.createElement("input");
        name.value = p.name;
        name.className = "w-full mt-2 bg-transparent border-b border-gray-600 text-sm outline-none";

        name.onchange = () => renameDesign(p.id, name.value);

        // DELETE BUTTON
        const del = document.createElement("button");
        del.innerText = "🗑 Delete";
        del.className = "mt-2 text-red-400 text-xs hover:text-red-600";

        del.onclick = () => deleteDesign(p.id);

        card.appendChild(img);
        card.appendChild(name);
        card.appendChild(del);

        grid.appendChild(card);
    });
}

loadDesigns();

function deleteDesign(id) {

    let projects = JSON.parse(localStorage.getItem("projects")) || [];

    projects = projects.filter(p => p.id !== id);

    localStorage.setItem("projects", JSON.stringify(projects));

    loadDesigns(); // refresh UI

}

function renameDesign(id, newName) {

    let projects = JSON.parse(localStorage.getItem("projects")) || [];

    projects = projects.map(p => {
        if (p.id === id) {
            return { ...p, name: newName };
        }
        return p;
    });

    localStorage.setItem("projects", JSON.stringify(projects));
}

let deleteId = null;

function openDeleteModal(id) {
    deleteId = id;

    const modal = document.getElementById("deleteModal");
    const content = document.getElementById("deleteContent");

    modal.classList.remove("hidden");

    setTimeout(() => {
        content.classList.remove("scale-90", "opacity-0");
        content.classList.add("scale-100", "opacity-100");
    }, 10);
}

function closeDeleteModal() {
    document.getElementById("deleteModal").classList.add("hidden");
    deleteId = null;
}

function confirmDelete() {

    let projects = JSON.parse(localStorage.getItem("projects")) || [];

    projects = projects.filter(p => p.id !== deleteId);

    localStorage.setItem("projects", JSON.stringify(projects));

    closeDeleteModal();
    loadDesigns(); // refresh UI
}

function showToast(message) {

    const toast = document.getElementById("toast");
    const text = document.getElementById("toastText");

    text.innerText = message;

    toast.classList.remove("hidden");

    setTimeout(() => {
        toast.classList.remove("translate-y-10", "opacity-0");
        toast.classList.add("translate-y-0", "opacity-100");
    }, 10);

    setTimeout(() => {
        toast.classList.add("translate-y-10", "opacity-0");

        setTimeout(() => {
            toast.classList.add("hidden");
        }, 300);

    }, 2000);
}

window.addEventListener("storage", () => {
    loadDesigns && loadDesigns();
    loadRecentDesigns && loadRecentDesigns();
});

function createNewDesign() {
    window.location.href = "/editor";
}


function loadRecentDesigns() {

    const container = document.getElementById("recentDesigns");
    container.innerHTML = "";

    let projects = JSON.parse(localStorage.getItem("projects")) || [];

    if (projects.length === 0) {
        container.innerHTML = `
            <p class="text-gray-400">No designs yet 🚀</p>
        `;
        return;
    }

    // show only latest 3
    const recent = projects.slice(-3).reverse();

    recent.forEach(project => {

        const card = document.createElement("div");

        card.className = `
            bg-[#0f172a] rounded-xl overflow-hidden 
            border border-gray-800
            hover:scale-[1.03] transition cursor-pointer
        `;

        const img = document.createElement("img");
        img.src = project.image;
        img.className = "w-full h-40 object-cover";

        img.onclick = () => {
            window.location.href = `/editor?img=${project.image}`;
        };

        card.appendChild(img);
        container.appendChild(card);
    });
}

loadRecentDesigns();
</script>

</body>
</html>
