<!DOCTYPE html>

<html>
<head>
    <title>My Designs - InteriorCraft</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#020617] text-white">

<!-- 🔝 NAVBAR -->

<div class="h-14 bg-[#0b1220] flex items-center justify-between px-6 border-b border-gray-800 shadow-md">
    <div class="flex items-center gap-6">
        <h1 class="text-lg font-bold text-blue-400">InteriorCraft</h1>
        <a href="/" class="text-sm text-gray-300 hover:text-white">Home</a>
        <a href="/dashboard" class="text-sm text-gray-300 hover:text-white">Dashboard</a>
        <a href="/my_designs" class="text-sm text-blue-400 border-b border-blue-400">My Designs</a>
    </div>
</div>

<!-- 🔥 MAIN -->

<div class="max-w-7xl mx-auto px-6 py-6 space-y-6">


<!-- HEADER -->
<div class="flex justify-between items-center mb-6">
    <div>
        <h1 class="text-3xl font-bold">My Designs</h1>
        <p class="text-gray-400 text-sm">Your creative workspace ✨</p>
    </div>

    <!-- FILTERS -->
    <div class="flex gap-3">
        <button class="filter-btn bg-blue-500 px-4 py-1 rounded" data-filter="all">All</button>
        <button class="filter-btn bg-gray-700 px-4 py-1 rounded" data-filter="recent">Recent</button>
        <button class="filter-btn bg-gray-700 px-4 py-1 rounded" data-filter="favorites">Favorites</button>
    </div>
</div>

<div class="flex flex-wrap gap-3 items-center">

    <!-- SEARCH -->
    <input id="searchInput"
        placeholder="Search designs..."
        class="bg-[#0f172a] px-4 py-2 rounded-xl border border-gray-800 text-sm w-64 focus:ring-2 focus:ring-blue-500 outline-none">

    <!-- SORT -->
    <select id="sortSelect"
        class="bg-[#0f172a] px-4 py-2 rounded-xl border border-gray-800 text-sm">
        <option value="new">Newest</option>
        <option value="old">Oldest</option>
    </select>

    <!-- CATEGORY -->
    <select id="categoryFilter"
        class="bg-[#0f172a] px-4 py-2 rounded-xl border border-gray-800 text-sm">
        <option value="all">All Categories</option>
        <option value="Living Room">Living Room</option>
        <option value="Bedroom">Bedroom</option>
        <option value="Kitchen">Kitchen</option>
    </select>

</div>

<!-- GRID -->
<div id="designsGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>


</div>

<div class="grid grid-cols-1 md:grid-cols-3 gap-4">

    <div class="bg-gradient-to-r from-blue-500/10 to-blue-500/5 p-5 rounded-xl border border-blue-500/20">
        <h2 id="totalCount" class="text-2xl font-bold">0</h2>
        <p class="text-sm text-gray-400">Total Designs</p>
    </div>

    <div class="bg-gradient-to-r from-green-500/10 to-green-500/5 p-5 rounded-xl border border-green-500/20">
        <h2 id="livingCount" class="text-2xl font-bold">0</h2>
        <p class="text-sm text-gray-400">Living Room</p>
    </div>

    <div class="bg-gradient-to-r from-purple-500/10 to-purple-500/5 p-5 rounded-xl border border-purple-500/20">
        <h2 id="bedroomCount" class="text-2xl font-bold">0</h2>
        <p class="text-sm text-gray-400">Bedroom</p>
    </div>

</div>

<!-- 🗑 DELETE MODAL -->

<div id="deleteModal"
     class="hidden fixed inset-0 z-[9999] flex items-center justify-center bg-black bg-opacity-60">


<div class="bg-[#0f172a] p-6 rounded-xl w-96 text-center border border-gray-700 shadow-2xl">

    <h2 class="text-lg font-semibold mb-3">Delete Design?</h2>
    <p class="text-gray-400 mb-5">This action cannot be undone.</p>

    <div class="flex justify-center gap-4">
        <button onclick="confirmDelete()"
            class="bg-red-500 px-4 py-2 rounded hover:bg-red-600">
            Delete
        </button>

        <button onclick="closeDeleteModal()"
            class="bg-gray-600 px-4 py-2 rounded hover:bg-gray-700">
            Cancel
        </button>
    </div>

</div>

<div id="renameModal"
     class="hidden fixed inset-0 z-[9999] flex items-center justify-center bg-black/60">

    <div class="bg-[#0f172a] p-6 rounded-xl w-80 text-center">

        <h2 class="text-lg mb-3">Rename Design</h2>

        <input id="renameInput"
            class="w-full px-3 py-2 bg-gray-800 rounded text-white outline-none">

        <div class="flex justify-center gap-3 mt-4">
            <button onclick="confirmRename()"
                class="bg-blue-500 px-4 py-2 rounded">
                Save
            </button>

            <button onclick="closeRenameModal()"
                class="bg-gray-600 px-4 py-2 rounded">
                Cancel
            </button>
        </div>

    </div>
</div>

</div>


<style>
/* smooth hover */
.card-hover {
  transition: all 0.3s ease;
}

/* glass effect (optional) */
.glass {
  backdrop-filter: blur(10px);
}

/* nicer scrollbar */
::-webkit-scrollbar {
  width: 6px;
}
::-webkit-scrollbar-thumb {
  background: #334155;
  border-radius: 10px;
}

.glass {
  background: rgba(15, 23, 42, 0.6);
  backdrop-filter: blur(12px);
}

input {
  transition: all 0.2s ease;
}
</style>


<script>

let deleteId = null;

// 🔥 LOAD DESIGNS
function loadDesigns(filter = "all") {

    let projects = JSON.parse(localStorage.getItem("projects")) || [];

    const search = document.getElementById("searchInput").value.toLowerCase();
    const category = document.getElementById("categoryFilter").value;
    const sort = document.getElementById("sortSelect").value;

    const grid = document.getElementById("designsGrid");
    grid.innerHTML = `
<div class="col-span-full text-center py-20">
    <h2 class="text-xl font-semibold mb-2">No Designs Yet 🎨</h2>
    <p class="text-gray-400 mb-4">Start creating your dream space</p>
    <a href="/editor" class="bg-blue-500 px-4 py-2 rounded">Create Design</a>
</div>
`;

    // 🔍 SEARCH
    if (search) {
        projects = projects.filter(p =>
            (p.name || "").toLowerCase().includes(search)
        );
    }

    // 📦 CATEGORY FILTER
    if (category !== "all") {
        projects = projects.filter(p => p.category === category);
    }

    // ❤️ FAVORITES
    if (filter === "favorites") {
        projects = projects.filter(p => p.favorite);
    }

    // 🕒 RECENT
    if (filter === "recent") {
        projects = projects.slice(-4).reverse();
    }

    // 📅 SORT
    if (sort === "new") {
        projects.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
    } else {
        projects.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
    }

    if (projects.length === 0) {
        grid.innerHTML = "<p class='text-gray-400 col-span-full text-center'>No designs found 🚀</p>";
        return;
    }

    projects.forEach(p => {

        const card = document.createElement("div");

card.addEventListener("click", (e) => {
    if (e.target.closest("button") || e.target.tagName === "INPUT") return;

    localStorage.setItem("currentDesign", JSON.stringify(p));
    window.location.href = "/editor";
});

       card.className = `
    group relative 
    bg-[#0f172a] 
    rounded-2xl 
    border border-gray-800 
    overflow-hidden
    hover:scale-[1.03]
    hover:shadow-xl hover:shadow-blue-500/20
    transition duration-300
`;

        const img = document.createElement("img");
       console.log(p.image);
       img.src = p.image;
       img.className = "w-full h-52 object-cover group-hover:scale-110 transition duration-500";

        const footer = document.createElement("div");
        footer.className = "p-3";

footer.innerHTML = `
<div class="flex justify-between items-center text-sm">
    
    <span class="design-name cursor-text">
        ${p.name || "Untitled"}
    </span>

    <div class="flex gap-2">
       <button class="fav-btn">
    ${p.favorite ? "❤️" : "🤍"}
</button>
        <button class="rename-btn">✏️</button>
        <button class="download-btn">⬇️</button>
        <button class="delete-btn text-red-400">🗑</button>
    </div>

</div>

<p class="text-xs text-gray-400 mt-1">${p.category || "No Category"}</p>
`;



        card.appendChild(img);
        card.appendChild(footer);

        const nameEl = footer.querySelector(".design-name");
const renameBtn = footer.querySelector(".rename-btn");

renameBtn.addEventListener("click", (e) => {
    e.stopPropagation();

    const input = document.createElement("input");
    input.value = nameEl.innerText;

    input.className = `
        bg-gray-800 text-white px-2 py-1 rounded text-sm outline-none w-full
    `;

    nameEl.replaceWith(input);
    input.focus();

    function saveRename() {
        const newName = input.value.trim() || "Untitled";

        let projects = JSON.parse(localStorage.getItem("projects")) || [];

        projects = projects.map(item => {
            if (item.id === p.id) {
                return { ...item, name: newName };
            }
            return item;
        });

        localStorage.setItem("projects", JSON.stringify(projects));

        const newSpan = document.createElement("span");
        newSpan.className = "design-name cursor-text";
        newSpan.innerText = newName;

        input.replaceWith(newSpan);
    }

    input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") saveRename();
    });

    input.addEventListener("blur", saveRename);
});

footer.querySelector(".fav-btn").addEventListener("click", (e) => {
    e.stopPropagation();
    toggleFavorite(p.id);
});

footer.querySelector(".download-btn").addEventListener("click", (e) => {
    e.stopPropagation();
    downloadImage(p.image);
});

footer.querySelector(".delete-btn").addEventListener("click", (e) => {
    e.stopPropagation();
    openDeleteModal(p.id);
});

grid.appendChild(card);
}); // closes forEach

updateAnalytics();

} // closes loadDesigns  ✅ IMPORTANT


// ❤️ FAVORITE
function toggleFavorite(id) {
    let projects = JSON.parse(localStorage.getItem("projects")) || [];

    projects = projects.map(p => {
        if (p.id === id) {
            return { ...p, favorite: !p.favorite };
        }
        return p;
    });

    localStorage.setItem("projects", JSON.stringify(projects));
    loadDesigns();
}

// ✏️ RENAME
function renameDesign(id, newName) {
    let projects = JSON.parse(localStorage.getItem("projects")) || [];

    projects = projects.map(p => {
        if (p.id === id) {
            return { ...p, name: newName };
        }
        return p;
    });

    localStorage.setItem("projects", JSON.stringify(projects));
}

// 🗑 DELETE MODAL
function openDeleteModal(id) {
    deleteId = id;
    document.getElementById("deleteModal").classList.remove("hidden");
}

function closeDeleteModal() {
    document.getElementById("deleteModal").classList.add("hidden");
}

// 🗑 CONFIRM DELETE
function confirmDelete() {

    let projects = JSON.parse(localStorage.getItem("projects")) || [];

    projects = projects.filter(p => p.id !== deleteId);

    localStorage.setItem("projects", JSON.stringify(projects));

    closeDeleteModal();
    loadDesigns();
}

document.getElementById("searchInput").oninput = () => loadDesigns();
document.getElementById("sortSelect").onchange = () => loadDesigns();
document.getElementById("categoryFilter").onchange = () => loadDesigns();

// 🔥 FILTER BUTTONS
document.addEventListener("DOMContentLoaded", () => {

    document.querySelectorAll(".filter-btn").forEach(btn => {

        btn.addEventListener("click", () => {

            const filter = btn.getAttribute("data-filter");

            // UI ACTIVE
            document.querySelectorAll(".filter-btn").forEach(b => {
                b.classList.remove("bg-blue-500");
                b.classList.add("bg-gray-700");
            });

            btn.classList.remove("bg-gray-700");
            btn.classList.add("bg-blue-500");

            loadDesigns(filter);
        });
    });

    loadDesigns("all");
});

function downloadImage(dataURL) {
    const link = document.createElement("a");
    link.href = dataURL;
    link.download = "InteriorCraft.png";
    link.click();
}

let renameId = null;

function openRenameModal(id, currentName) {
    renameId = id;
    document.getElementById("renameInput").value = currentName;
    document.getElementById("renameModal").classList.remove("hidden");
}

function closeRenameModal() {
    document.getElementById("renameModal").classList.add("hidden");
}

function confirmRename() {

    let projects = JSON.parse(localStorage.getItem("projects")) || [];
    const newName = document.getElementById("renameInput").value;

    projects = projects.map(p => {
        if (p.id === renameId) {
            return { ...p, name: newName };
        }
        return p;
    });

    localStorage.setItem("projects", JSON.stringify(projects));

    closeRenameModal();
    loadDesigns();
}

function updateAnalytics() {

    let projects = JSON.parse(localStorage.getItem("projects")) || [];

    document.getElementById("totalCount").innerText = projects.length;

    const living = projects.filter(p => p.category === "Living Room").length;
    const bedroom = projects.filter(p => p.category === "Bedroom").length;

    document.getElementById("livingCount").innerText = living;
    document.getElementById("bedroomCount").innerText = bedroom;
}
    

</script>

</body>
</html>
